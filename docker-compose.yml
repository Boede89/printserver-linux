services:
  # Kopiert cupsd.conf aus dem Image ins Volume, bevor cupsd startet.
  cups-bootstrap:
    image: olbat/cupsd:latest
    container_name: printserver_cups_bootstrap
    restart: "no"
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        if [ ! -f /config/cupsd.conf ]; then
          echo "[cups-bootstrap] Standard-CUPS-Config ins Volume kopieren..."
          cp -a /etc/cups/. /config/
        else
          echo "[cups-bootstrap] cupsd.conf bereits vorhanden."
        fi
        echo "[cups-bootstrap] CUPS für Docker-Netzwerk (Print-Bridge) anpassen..."
        if grep -q '^Listen localhost:631' /config/cupsd.conf 2>/dev/null; then
          sed -i 's/^Listen localhost:631/Listen *:631/' /config/cupsd.conf
        fi
        if ! grep -qE '^Listen \*:631' /config/cupsd.conf 2>/dev/null; then
          echo 'Listen *:631' >> /config/cupsd.conf
        fi
    volumes:
      - cups_config:/config

  cups:
    image: olbat/cupsd:latest
    container_name: printserver_cups
    restart: unless-stopped
    depends_on:
      cups-bootstrap:
        condition: service_completed_successfully
    environment:
      # olbat/cupsd: Admin-Benutzer ist „print“ (Standard-Passwort: print), nicht CUPSADMIN/CUPSPASSWORD.
      CUPSADMIN: admin
      CUPSPASSWORD: ${CUPS_ADMIN_PASSWORD:-changeme}
    volumes:
      - cups_config:/etc/cups
      - cups_spool:/var/spool/cups
    ports:
      - "127.0.0.1:631:631"

  print-bridge:
    build: ./print-bridge
    container_name: printserver_bridge
    restart: unless-stopped
    depends_on:
      - cups
    environment:
      PRINT_API_TOKEN: ${PRINT_API_TOKEN:?PRINT_API_TOKEN setzen}
      PRINT_DEFAULT_PRINTER: ${PRINT_DEFAULT_PRINTER:-Zentrale}
      PRINT_BRIDGE_PORT: ${PRINT_BRIDGE_PORT:-8766}
      PRINT_ALLOWED_PRINTER_PREFIXES: ${PRINT_ALLOWED_PRINTER_PREFIXES:-}
      CUPS_SERVER: print:${CUPS_ADMIN_PASSWORD:-print}@cups:631
    volumes:
      - print_jobs:/var/spool/print-bridge
    ports:
      - "${PRINT_BRIDGE_BIND:-127.0.0.1}:${PRINT_BRIDGE_PORT:-8766}:8766"

volumes:
  cups_config:
  cups_spool:
  print_jobs:
